services:
  - type: web
    name: venderscope-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    # --proxy-headers: tells uvicorn to trust X-Forwarded-For from Render's load balancer
    # so request.client.host becomes the real client IP, not the shared LB internal IP.
    # Without this, every user shares one rate-limit bucket and the 5/min login cap is useless.
    # --forwarded-allow-ips="*" is correct here: Render sits behind its own trusted proxy
    # and does not publish a stable IP range to whitelist more narrowly.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips="*"

